name: Build Windows Installer

on:
  push:
    branches:
      - codex/build-windows-installer
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Generate database code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows release
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path $iscc)) {
            throw "ISCC.exe was not found after installing Inno Setup."
          }
          New-Item -ItemType Directory -Force -Path dist/windows | Out-Null
          & $iscc installer/windows.iss

      - name: Create portable zip
        shell: pwsh
        run: |
          Compress-Archive `
            -Path build/windows/x64/runner/Release/* `
            -DestinationPath dist/windows/offline_desktop_program_windows_portable.zip `
            -Force

      - name: Commit built installer
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/windows/offline_desktop_program_setup.exe dist/windows/offline_desktop_program_windows_portable.zip
          git commit -m "Build Windows installer [skip ci]"
          git push
